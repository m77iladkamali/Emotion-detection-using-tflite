name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.13.9'

      - run: flutter pub get

      - name: Build APK
        run: |
          flutter build apk --release || true

      - name: Show Build Folder
        run: |
          echo "===== APK FILES ====="
          find . -iname "*.apk"

          echo "===== BUILD FOLDER ====="
          ls -R build || true

      - uses: actions/upload-artifact@v4
        with:
          name: build-files
          path: build
