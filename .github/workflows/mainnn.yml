name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.24.0

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release || true

      - name: Find APK Files
        run: |
          echo "===== APK FILES ====="
          find . -name "*.apk"

          echo "===== ANDROID OUTPUTS ====="
          ls -R android/app/build/outputs || true

          echo "===== FLUTTER OUTPUTS ====="
          ls -R build/app/outputs || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: |
            **/*.apk
